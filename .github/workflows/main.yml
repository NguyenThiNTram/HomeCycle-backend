name: .NET Clean Architecture CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x' # .NET 8

jobs:
  # ----------------------------------------------------
  # JOB 1: BUILD & RESTORE
  # ----------------------------------------------------
  build_and_test:
    name: Build and Restore
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore HomeCycle-platform.sln

    - name: Build Solution
      run: dotnet build HomeCycle-platform.sln --configuration Release --no-restore

# BẬT LẠI ĐOẠN NÀY KHI BẠN ĐÃ VIẾT UNIT TEST:
#    - name: Run Unit Tests with Coverage
#      run: |
#        dotnet test HomeCycle-platform.sln \
#        --configuration Release \
#        --no-build \
#        --collect:"XPlat Code Coverage" \
#        --logger trx \
#        --results-directory ./TestResults

#    - name: Upload Test Results
#      uses: actions/upload-artifact@v4
#      if: always()
#      with:
#        name: test-results
#        path: ./TestResults

  # ----------------------------------------------------
  # JOB 2: SECURITY SCAN (Quét mã nguồn tĩnh)
  # ----------------------------------------------------
  security_scan:
    name: Code Quality and Security
    runs-on: ubuntu-latest
    needs: build_and_test

    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'csharp'

    # BẮT BUỘC PHẢI CÓ CHO C#: CodeQL cần build dự án để phân tích cấu trúc
    - name: Setup .NET for CodeQL
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build for CodeQL Analysis
      run: |
        dotnet restore HomeCycle-platform.sln
        dotnet build HomeCycle-platform.sln --configuration Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ----------------------------------------------------
  # JOB 3: DEPLOY TO RENDER (Render tự kéo code từ GitHub về build Docker)
  # ----------------------------------------------------
  deploy_to_render:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    # Luồng chạy: Sau khi quét bảo mật (security_scan) thành công sẽ nhảy vào deploy luôn
    needs: security_scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Call Render Webhook
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
